<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 440px;
  height: 280px;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
  position: relative;
}
.content {
  text-align: center;
  z-index: 1;
}
.icon {
  font-size: 48px;
  margin-bottom: 12px;
}
.title {
  font-size: 24px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}
.tagline {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  font-weight: 500;
}
.demo {
  margin-top: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.score-before {
  font-size: 16px;
  color: rgba(255,255,255,0.3);
  text-decoration: line-through;
  font-weight: 600;
}
.arrow {
  font-size: 14px;
  color: #F59E0B;
}
.score-after {
  font-size: 16px;
  color: #F59E0B;
  font-weight: 700;
  background: rgba(245,158,11,0.15);
  padding: 2px 10px;
  border-radius: 6px;
}
/* Decorative blurred circles */
.blur-circle {
  position: absolute;
  border-radius: 50%;
  filter: blur(40px);
  opacity: 0.15;
}
.blur-circle.a { width: 200px; height: 200px; background: #F59E0B; top: -60px; right: -40px; }
.blur-circle.b { width: 150px; height: 150px; background: #3B82F6; bottom: -40px; left: -30px; }
</style>
</head>
<body>
  <div class="blur-circle a"></div>
  <div class="blur-circle b"></div>
  <div class="content">
    <div class="icon">🛡️</div>
    <div class="title">Spoiler Shield</div>
    <div class="tagline">Auto-blur sports scores & spoilers</div>
    <div class="demo">
      <span class="score-before">3 - 1</span>
      <span class="arrow">→</span>
      <span class="score-after">🛡️ - 🛡️</span>
    </div>
  </div>
</body>
</html>
