<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spoiler Shield</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <img class="logo" src="../icons/icon128.png" alt="Spoiler Shield" width="32" height="32">
      <div class="title-group">
        <h1>Spoiler Shield</h1>
        <span class="version" id="versionLabel"></span>
        <span id="paidBadge" class="paid-badge" style="display:none">✓</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Trial / Tier Banner -->
    <div id="tierBanner" class="tier-banner" style="display:none">
      <div class="tier-row">
        <span id="tierIcon" class="tier-icon"></span>
        <span id="tierLabel" class="tier-label"></span>
        <span id="tierDays" class="tier-days"></span>
      </div>
      <div id="trialProgress" class="trial-progress" style="display:none">
        <div id="trialBar" class="trial-bar"></div>
      </div>
    </div>

    <div class="toggle-row">
      <div class="toggle-label">
        <span class="label-text">Protection</span>
        <span id="statusBadge" class="badge active">Active</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="masterToggle" checked>
        <span class="track">
          <span class="thumb"></span>
        </span>
      </label>
    </div>

    <div id="siteRow" class="site-row" style="display:none">
      <div class="site-info">
        <span class="site-label">This site</span>
        <span id="siteHost" class="site-host"></span>
      </div>
      <button id="siteBtn" class="site-btn">Pause here</button>
    </div>

    <button id="upgradeBtn" class="upgrade-btn" style="display:none">
      Unlock All Sports &mdash; $4.99
    </button>

    <button id="keepBtn" class="keep-btn" style="display:none">
      Keep it forever &mdash; $4.99
    </button>

    <p class="description" id="description">Sports scores & spoilers are hidden across all websites.</p>

    <p class="shortcut-hint" id="shortcutHint">Toggle: <kbd>Alt</kbd>+<kbd>S</kbd></p>

    <div class="footer">
      <div class="footer-links">
        <a href="https://chromewebstore.google.com/detail/spoiler-shield/ndenomgckldachhdmfpgopjggoekgbgh/reviews" target="_blank">&#9733; Rate</a>
        <span class="footer-dot">&middot;</span>
        <a href="https://github.com/saranpol/spoiler-shield/issues/new?title=Spoiler%20got%20through" target="_blank">Report a spoiler</a>
      </div>
      <span class="dev-credit">by <a href="https://github.com/saranpol/spoiler-shield" target="_blank">saran.pol</a></span>
    </div>
  </div>

  <script src="../ExtPay.js"></script>
  <script src="popup.js"></script>
</body>
</html>
